    <body>
         <script>
            var name, item, quantity;
            now = new Date();
            hour = now.getHours();

            name = window.prompt("Please enter your name");
            item = window.prompt("Please enter the item you want to order");
            quantity = window.prompt("Please enter the amount of" + item + " you want to order");

            if (hour < 12) {
                document.write("<h1> Good morning. ")
            } else if (hour < 18) {
                document.write("<h1> Good afternoon. ")
            } else {
                document.write("<h1> Good evening. ")
            }
            document.writeln("Thank you "+ name + ", for ordering " + quantity + " " + item + " from our store!")
            document.writeln("Your order will be delivered on " + now.getMonth() + "/" + (now.getDate() + 7) + "/" + now.getFullYear())
	    </script>
